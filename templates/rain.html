{% extends "base.html" %}
{% block content %}

<div class="rain-page">
    <audio id="rainAudio" loop preload="auto">
    <source src="{{ url_for('static', filename='audio/relax.mp3') }}" type="audio/mpeg">
    </audio>
  <div class="rain-topbar">
    <div>
      <h1>Rain Ripple 🌧️</h1>
      <p>แตะหยดฝนเบาๆ แล้วดูวงคลื่นค่อยๆ กระจาย</p>
    </div>

    <div class="rain-actions">
    <button class="rain-btn" id="rainMusicBtn">🎵 เปิดเพลง</button>
    <button class="rain-btn" onclick="clearRipples()">ล้างหน้าจอ</button>
    </div>
  </div>

  <div id="rainStage" class="rain-stage">
    <div id="rainMessage" class="rain-message">
      แตะตรงไหนก็ได้ แล้วหายใจออกช้าๆ 🌿
    </div>
  </div>
</div>

<script>
const stage = document.getElementById("rainStage");
const message = document.getElementById("rainMessage");

const comfortLines = [
  "ความรู้สึกนี้จะค่อยๆ ผ่านไปเหมือนวงคลื่น",
  "ตอนนี้แค่หายใจออกยาวๆ ก็พอ",
  "เราไม่ต้องรีบสงบในทันที",
  "แตะพื้นเบาๆ แล้วกลับมาที่ตรงนี้",
  "ใจที่สั่นไหว ไม่ได้แปลว่าเราอ่อนแอ",
  "ตอนนี้ปลอดภัยพอในนาทีนี้",
  "ปล่อยให้ความคิดผ่านไปเหมือนฝน",
  "เราอยู่ตรงนี้ ไม่ใช่ในเหตุการณ์เดิม",
  "ค่อยๆ กลับมาทีละลมหายใจ",
  "วันนี้แค่ประคองตัวเองก็พอแล้ว"
];

function createRipple(x, y) {
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  stage.appendChild(ripple);

  setTimeout(() => ripple.remove(), 1800);

  const line = comfortLines[Math.floor(Math.random() * comfortLines.length)];
  message.textContent = line;
}

function createDrop() {
  const drop = document.createElement("div");
  drop.className = "rain-drop";

  drop.style.left = Math.random() * 100 + "%";
  drop.style.animationDuration = (Math.random() * 1.6 + 1.8) + "s";
  drop.style.opacity = Math.random() * 0.35 + 0.25;

  stage.appendChild(drop);

  setTimeout(() => drop.remove(), 3600);
}

stage.addEventListener("click", (e) => {
  const rect = stage.getBoundingClientRect();
  createRipple(e.clientX - rect.left, e.clientY - rect.top);
});

stage.addEventListener("touchstart", (e) => {
  const rect = stage.getBoundingClientRect();
  const touch = e.touches[0];
  createRipple(touch.clientX - rect.left, touch.clientY - rect.top);
}, { passive: true });

function clearRipples() {
  document.querySelectorAll(".ripple").forEach(x => x.remove());
  message.textContent = "ล้างแล้ว เริ่มใหม่ได้เสมอ 🌧️";
}

setInterval(createDrop, 180);

for (let i = 0; i < 20; i++) {
  setTimeout(createDrop, i * 80);
}
const rainAudio = document.getElementById("rainAudio");
const rainMusicBtn = document.getElementById("rainMusicBtn");

rainAudio.volume = 0.25;

rainMusicBtn.addEventListener("click", async () => {
  try {
    if (rainAudio.paused) {
      await rainAudio.play();
      rainMusicBtn.innerHTML = "⏸ ปิดเพลง";
    } else {
      rainAudio.pause();
      rainMusicBtn.innerHTML = "🎵 เปิดเพลง";
    }
  } catch (err) {
    console.log("Rain audio error:", err);
    rainMusicBtn.innerHTML = "⚠️ เปิดเพลงไม่ได้";
  }
});
</script>

{% endblock %}
