<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>My Mind, My Pace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#5f8f72">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="My Mind">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/mental.png') }}">
</head>

<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">🌿</div>
      <div>
        <b>my mind,</b><br>
        <span>my pace</span>
      </div>
    </div>

<nav>

  <a href="/" class="nav-link">
    <span>🏠</span>
    Today
  </a>

  <a href="/healing" class="nav-link">
    <span>🌙</span>
    Healing
  </a>

  <a href="/bubble" class="nav-link">
    <span>🫧</span>
    Calm
  </a>

  <a href="/coping" class="nav-link">
    <span>🤍</span>
    Notes
  </a>

  <div class="nav-more">

    <button class="nav-link more-btn" onclick="toggleMoreMenu()">
      <span>☰</span>
      More
    </button>

    <div id="moreMenu" class="more-menu">

      <a href="/flashback">🌫 Flashback</a>

      <a href="/rumination">💭 Rumination</a>

      <a href="/hopebox">🎁 Hope Box</a>

      <a href="/assessments">🧾 Assessments</a>

      <a href="/sand">🏖️ Sand Drawing</a>

      <a href="/rain">🌧️ Rain Ripple</a>

      <a href="/firefly">✨ Firefly Calm</a>

      <a href="/cloud">☁️ Cloud Thoughts</a>

      <a href="/report">📊 Report</a>

      <a href="/export">📤 Export Excel</a>

    </div>

  </div>

</nav>

    <div class="side-card">
      <b>You’re doing your best.</b>
      <p>And that’s enough by JANE.</p>
      <span>🤍</span>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
function toggleMoreMenu() {

  const menu = document.getElementById("moreMenu");

  menu.classList.toggle("show");

}

document.addEventListener("click", function(e) {

  const more = document.querySelector(".nav-more");

  if (!more.contains(e.target)) {

    document.getElementById("moreMenu")
      .classList.remove("show");

  }

});

</script>
</body>
</html>
